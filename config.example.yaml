site:
  id: default
  base_url: "https://cookiespooky.github.io/notepub/" # production
  title: "Notepub"
  description: "Notepub: Markdown → умный сайт"
  default_og_image: ""
  media_base_url: "https://cookiespooky.github.io/notepub/media/" # production media
  host: 127.0.0.1

runtime:
  mode: "dev" # dev|prod
  dev:
    base_url: "http://127.0.0.1:8080/"
    media_base_url: "http://127.0.0.1:8080/media/"

s3: # for serve mode indexed artifacts
  endpoint: "http://127.0.0.1:9000" # local minio s3
  region: "us-east-1"
  force_path_style: true
  bucket: local-bucket
  prefix: ""
  access_key: minioadmin
  secret_key: minioadmin

content:
  source: "local"  # "s3" or "local"
  local_dir: "./examples/dev-sandbox/content" # in case of "local"

markdown:
  # safe (default), unsafe, deny
  html_policy: "safe"

og_type_by_type:
  article: "article"
  page: "website"

paths: # indexed artifacts dir for serve mode
  file_root: ./.notepub
  artifacts_dir: ./.notepub/artifacts
  snapshot_file: ./.notepub/snapshot/objects.json
  cache_root: ./.notepub/cache

theme:
  dir: ./examples/dev-sandbox
  name: theme
  templates_subdir: templates
  assets_subdir: assets

server: # for serve mode
  listen: "127.0.0.1:8080" # http://127.0.0.1:8080

rules_path: ./examples/dev-sandbox/rules.yaml

robots:
  disallow:
    - "/private/"
  extra: |
    # Custom rules here (dev)

cache:
  html_ttl_seconds: 600
  stale_if_error_seconds: 604800
